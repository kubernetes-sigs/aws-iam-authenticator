# golangci-lint configuration (v2.11.3)
# Install: https://golangci-lint.run/welcome/install/
# Run locally: make lint

version: "2"

linters:
  default: none
  enable:
    # correctness
    - errcheck        # unchecked errors
    - govet           # suspicious constructs
    - staticcheck     # staticcheck rules
    - ineffassign     # unused assignments
    - unused          # unused code
    - copyloopvar     # loop variable capture bugs
    - nilerr          # returning nil after checking for non-nil error
    - unconvert       # unnecessary type conversions
    # security
    - gosec           # security issues
    # code quality
    - gocritic        # opinionated checks
    - misspell        # common spelling mistakes
    - nolintlint      # invalid or unnecessary nolint directives
    - unparam         # unused function parameters
    - revive          # replacement for golint

formatters:
  enable:
    - gofmt
    - goimports

issues:
  exclusions:
    rules:
      # gosec and gocritic are noisy in tests
      - path: "_test\\.go"
        linters:
          - gosec
          - gocritic
          - misspell
      # G101: false positive on Kubernetes API kind constant name
      - linters:
          - gosec
        text: "G101"
      # G402: TLS MinVersion — acceptable in test helpers
      - linters:
          - gosec
        text: "G402"
